name: Deploy

# Pipeline de publicação da API e do Web em servidor via SSH.
#
# Fluxo:
#   1. build-test: valida que API e Web instalam dependências e buildam
#      corretamente antes de qualquer alteração em produção.
#   2. deploy: conecta via SSH no servidor de produção, atualiza o código
#      (git pull) e reconstrói/reinicia os containers com o Docker Compose
#      de produção (docker-compose.yml + Makefile), sem exigir um registry
#      de imagens externo.
#
# Variáveis (Settings > Secrets and variables > Actions > Variables) necessárias:
#   SSH_HOST         Endereço/IP do servidor de produção
#   SSH_PORT         Porta SSH (opcional, padrão 22)
#   SSH_USERNAME     Usuário utilizado para conectar via SSH
#   DEPLOY_PATH      Caminho absoluto do projeto no servidor (ex.: /opt/gerenciador-financeiro)
#   SSH_CONNECT_TIMEOUT Timeout de conexão SSH (opcional, padrão 120s)
#   SSH_COMMAND_TIMEOUT Timeout de execução remota (opcional, padrão 20m)
#
# Segredo (Settings > Secrets and variables > Actions > Secrets) necessário:
#   SSH_PRIVATE_KEY  Chave privada SSH (formato PEM) com acesso ao servidor

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch ou tag a ser publicada'
        required: false
        default: 'main'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar dependências da API
        working-directory: api
        run: npm install --legacy-peer-deps

      - name: Build da API
        working-directory: api
        run: npm run build

      - name: Testes unitários da API
        working-directory: api
        run: npm run test

      - name: Instalar dependências do Web
        working-directory: web
        run: npm install --legacy-peer-deps

      - name: Build do Web
        working-directory: web
        run: npm run build

  deploy:
    name: Deploy via SSH
    needs: build-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validar variáveis obrigatórias de deploy
        run: |
          set -e

          missing=0
          if [ -z "${{ vars.SSH_HOST }}" ]; then
            echo "❌ Variável SSH_HOST não configurada.";
            missing=1
          fi
          if [ -z "${{ vars.SSH_USERNAME }}" ]; then
            echo "❌ Variável SSH_USERNAME não configurada.";
            missing=1
          fi
          if [ -z "${{ vars.DEPLOY_PATH }}" ]; then
            echo "❌ Variável DEPLOY_PATH não configurada.";
            missing=1
          fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "❌ Segredo SSH_PRIVATE_KEY não configurado.";
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy no servidor
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.SSH_HOST }}
          port: ${{ vars.SSH_PORT || 22 }}
          username: ${{ vars.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: ${{ vars.SSH_CONNECT_TIMEOUT || '120s' }}
          command_timeout: ${{ vars.SSH_COMMAND_TIMEOUT || '20m' }}
          script_stop: true
          script: |
            set -e

            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
            REF="${{ github.event.inputs.ref || github.ref_name }}"

            if [ -z "$DEPLOY_PATH" ]; then
              echo "❌ Variável DEPLOY_PATH não configurada."
              exit 1
            fi

            cd "$DEPLOY_PATH"

            echo "🔄 Atualizando código-fonte (branch/ref: $REF)..."
            git fetch --all --prune --tags

            if git rev-parse -q --verify "refs/tags/$REF^{tag}" >/dev/null 2>&1; then
              echo "🏷️ Ref '$REF' identificado como tag."
              git checkout --force --detach "refs/tags/$REF"
            elif git ls-remote --exit-code --heads origin "$REF" >/dev/null 2>&1; then
              echo "🌿 Ref '$REF' identificado como branch."
              git checkout -B "$REF" "origin/$REF"
            else
              echo "❌ Ref '$REF' não encontrada no repositório remoto como branch ou tag."
              exit 1
            fi

            echo "🔨 Reconstruindo e reiniciando containers de produção..."
            if command -v make >/dev/null 2>&1; then
              make prod-rebuild
            else
              echo "⚠️ 'make' não encontrado no servidor; usando docker compose diretamente."
              DOCKER_COMPOSE_CMD="docker compose"
              if command -v docker-compose >/dev/null 2>&1; then
                DOCKER_COMPOSE_CMD="docker-compose"
              fi
              $DOCKER_COMPOSE_CMD -f docker-compose.yml up --build -d
            fi

            echo "🧹 Removendo imagens antigas não utilizadas..."
            docker system prune -a --volumes -y

            echo "✅ Deploy concluído com sucesso!"

      - name: Verificar saúde da aplicação
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.SSH_HOST }}
          port: ${{ vars.SSH_PORT || 22 }}
          username: ${{ vars.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: ${{ vars.SSH_CONNECT_TIMEOUT || '120s' }}
          command_timeout: ${{ vars.SSH_COMMAND_TIMEOUT || '20m' }}
          script_stop: true
          script: |
            set -e

            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              echo "❌ Variável DEPLOY_PATH não configurada."
              exit 1
            fi

            cd "$DEPLOY_PATH"

            DOCKER_COMPOSE_CMD="docker compose"
            if command -v docker-compose >/dev/null 2>&1; then
              DOCKER_COMPOSE_CMD="docker-compose"
            fi

            MAX_ATTEMPTS=24
            ATTEMPT=1

            # Valida apenas o status HTTP 200 do /health.
            # O payload pode variar (ok/healthy/etc), então não fazemos grep em conteúdo.
            # Tenta tanto a API direta na porta 3000 quanto via nginx na porta 80,
            # pois alguns servidores podem expor apenas uma dessas rotas.
            until curl -fsS --connect-timeout 5 http://localhost:3000/health >/dev/null || curl -fsS --connect-timeout 5 http://localhost/health >/dev/null; do
              if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
                echo "❌ API não respondeu como saudável após o deploy."
                echo "📋 Estado atual dos containers:"
                $DOCKER_COMPOSE_CMD -f docker-compose.yml ps || true
                echo "📋 Últimas linhas de log da API:"
                $DOCKER_COMPOSE_CMD -f docker-compose.yml logs --tail=120 api || true
                exit 1
              fi

              echo "⏳ Aguardando API ficar saudável... (tentativa $ATTEMPT/$MAX_ATTEMPTS)"

              if [ $((ATTEMPT % 6)) -eq 0 ]; then
                echo "📌 Status parcial dos containers na tentativa $ATTEMPT:"
                $DOCKER_COMPOSE_CMD -f docker-compose.yml ps || true
              fi

              ATTEMPT=$((ATTEMPT + 1))
              sleep 5
            done

            echo "✅ API está saudável!"
