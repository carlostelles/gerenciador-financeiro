<div class="container">
    <div class="header">
        <h2>Gerenciar Contas</h2>
        <app-button-float appearance="primary" size="l" (click)="openFormModal()">
            Nova Conta
        </app-button-float>
    </div>

    <div class="content" *ngIf="!isLoading()">
        <div class="table-container">
            <table tuiTable size="l">
                <thead>
                    <tr>
                        <th tuiTh>Nome</th>
                        <th tuiTh>Ações</th>
                    </tr>
                </thead>
                <tbody tuiTbody>
                    <tr *ngFor="let conta of contas; trackBy: trackByFn">
                        <td tuiTd>{{ conta.nome }}</td>
                        <td tuiTd class="actions">
                            <button tuiButton appearance="secondary" size="s" (click)="openFormModal(conta)">
                                <tui-icon icon="@tui.edit" [style.height.rem]="1" appearance="secondary" tuiTooltip="Editar conta"
                                    aria-label="Editar conta" />
                            </button>
                            <button tuiButton appearance="destructive" size="s" (click)="confirmDelete(conta)">
                                <tui-icon icon="@tui.trash" [style.height.rem]="1" appearance="danger" tuiTooltip="Excluir conta"
                                    aria-label="Excluir conta" />
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div *ngIf="contas.length === 0" class="empty-state">
                <p>Nenhuma conta encontrada.</p>
                <p>Clique em "Nova Conta" para adicionar sua primeira conta.</p>
            </div>
        </div>
    </div>

    <div *ngIf="isLoading()" class="loading">
        <p>Carregando contas...</p>
    </div>
</div>
